name: PHPStan

on:
  push:
    paths:
      - '**.php'
      - 'phpstan.neon.dist'

jobs:
  phpstan:
    name: phpstan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Configure Filament repository/auth
        run: |
          if [ -n "${{ secrets.FILAMENT_USER }}" ] && [ -n "${{ secrets.FILAMENT_TOKEN }}" ]; then
            composer config repositories.filament composer https://packages.filamentphp.com/composer
            composer config --auth http-basic.packages.filamentphp.com "${{ secrets.FILAMENT_USER }}" "${{ secrets.FILAMENT_TOKEN }}"
          else
            composer config --unset repositories.filament || true
            echo "Filament secrets not available; using Packagist repository only."
          fi

      - name: Install composer dependencies
        uses: ramsey/composer-install@v3

      - name: Run PHPStan
        run: ./vendor/bin/phpstan --error-format=github
